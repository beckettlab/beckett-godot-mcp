# Beckett - MCP for Godot: cross-platform verification for the public Lite repo.
#
# Authored in the monorepo (source of truth) and staged into the public Lite repo
# by `pack.ps1 -StageDir` (see the .github staging block in pack.ps1). It boots the
# zero-sidecar addon headless on Windows, Linux, and macOS against pinned Godot
# builds and asserts the live MCP endpoint answers with the full 50-tool Lite
# surface - so a release can claim "Verified on Windows, Linux, macOS" with a green
# badge on the repo.
#
# One helper script (tests/ci-smoke.ps1, shell: pwsh) owns the boot + HTTP probe so
# CI and local runs share one code path. No secrets; only actions/checkout +
# actions/cache; every OS-specific step runs under PowerShell 7 (pwsh) which ships
# preinstalled on all three GitHub-hosted runners.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; a new push cancels the previous run for that ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.os }} - Godot ${{ matrix.godot }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Linux carries the version floor (4.4.1) AND a current build (4.6.2);
        # macOS + Windows run the current build only to keep runner minutes sane.
        include:
          - os: ubuntu-latest
            godot: 4.4.1
          - os: ubuntu-latest
            godot: 4.6.2
          - os: macos-latest
            godot: 4.6.2
          - os: windows-latest
            godot: 4.6.2

    env:
      # Isolated port for the probe (runtime bridge uses PORT+1). Kept out of the
      # 877x range a developer's editor might use.
      BECKETT_CI_PORT: 8790

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned official builds from godotengine/godot releases. Keyed by version+OS
      # so a warm cache skips the download entirely.
      - name: Cache Godot ${{ matrix.godot }}
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-${{ runner.os }}-${{ matrix.godot }}-v1

      - name: Fetch Godot ${{ matrix.godot }}
        shell: pwsh
        env:
          GODOT_VERSION: ${{ matrix.godot }}
          RUNNER_OS: ${{ runner.os }}
          CACHE_HIT: ${{ steps.cache-godot.outputs.cache-hit }}
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = $env:GODOT_VERSION
          $base = "https://github.com/godotengine/godot/releases/download/$ver-stable"
          # Standard (non-mono) builds. Windows uses the *_console.exe variant so
          # headless output reaches stdout; it ships inside the win64.exe.zip.
          switch ($env:RUNNER_OS) {
            'Linux'   { $asset = "Godot_v$ver-stable_linux.x86_64.zip";   $inner = "Godot_v$ver-stable_linux.x86_64" }
            'macOS'   { $asset = "Godot_v$ver-stable_macos.universal.zip"; $inner = "Godot.app/Contents/MacOS/Godot" }
            'Windows' { $asset = "Godot_v$ver-stable_win64.exe.zip";       $inner = "Godot_v$ver-stable_win64_console.exe" }
            default   { throw "unsupported runner OS: $($env:RUNNER_OS)" }
          }
          New-Item -ItemType Directory -Path godot-bin -Force | Out-Null
          $binPath = Join-Path 'godot-bin' $inner

          if ($env:CACHE_HIT -eq 'true' -and (Test-Path -LiteralPath $binPath)) {
            Write-Host "Godot $ver restored from cache: $binPath"
          } else {
            $zip = Join-Path ([System.IO.Path]::GetTempPath()) $asset
            $url = "$base/$asset"
            $ok = $false
            foreach ($attempt in 1..2) {
              try {
                Write-Host "Downloading $url (attempt $attempt)"
                Invoke-WebRequest -Uri $url -OutFile $zip -TimeoutSec 300
                $ok = $true
                break
              } catch {
                Write-Warning "download attempt $attempt failed: $($_.Exception.Message)"
                Start-Sleep -Seconds 5
              }
            }
            if (-not $ok) { throw "Godot download failed after 2 attempts: $url" }
            Expand-Archive -Path $zip -DestinationPath godot-bin -Force
            if (-not (Test-Path -LiteralPath $binPath)) {
              # macOS zips can nest the .app; Windows/Linux may extract a versioned
              # subfolder. Fall back to a search for the expected leaf name.
              $leaf = Split-Path $inner -Leaf
              $found = Get-ChildItem -Path godot-bin -Recurse -Filter $leaf -File | Select-Object -First 1
              if ($null -eq $found) { throw "extracted Godot binary '$leaf' not found under godot-bin" }
              $binPath = $found.FullName
            }
          }

          # Executable bit + clear macOS quarantine so Gatekeeper doesn't block the
          # unsigned binary from launching in a headless runner.
          if ($env:RUNNER_OS -ne 'Windows') {
            chmod +x "$binPath"
          }
          if ($env:RUNNER_OS -eq 'macOS') {
            xattr -dr com.apple.quarantine godot-bin 2>$null
            # Quarantine sits on the whole .app bundle; strip it there too.
            $app = (Resolve-Path 'godot-bin/Godot.app' -ErrorAction SilentlyContinue)
            if ($app) { xattr -dr com.apple.quarantine $app.Path 2>$null }
          }

          $abs = (Resolve-Path -LiteralPath $binPath).Path
          "GODOT_BIN=$abs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "GODOT_BIN=$abs"

      # The editor binary links libGL/xkbcommon/fontconfig even under --headless;
      # the prior ubuntu-only workflow proved these are needed on a bare runner.
      - name: Install Godot runtime libs (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1 libxkbcommon0 libfontconfig1

      - name: Print Godot version
        shell: pwsh
        run: |
          & "$env:GODOT_BIN" --headless --version

      # The staged Lite repo ships addons/beckett + repo docs but NO project.godot
      # (pack.ps1 -StageDir mirrors only addons/beckett/ and the registry extras).
      # Generate the minimal wrapper the editor needs to load the plugin. Idempotent:
      # a real project.godot, if one ever lands, is left untouched.
      - name: Generate wrapper project
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path -LiteralPath 'project.godot') {
            Write-Host 'project.godot already present - leaving it untouched'
          } else {
            @(
              'config_version=5'
              ''
              '[application]'
              'config/name="beckett-ci"'
              ''
              '[editor_plugins]'
              'enabled=PackedStringArray("res://addons/beckett/plugin.cfg")'
            ) | Set-Content -Path 'project.godot' -Encoding ascii
            Write-Host 'wrote minimal project.godot (config_version=5, beckett plugin enabled)'
          }

      # First import pass: let the editor build .godot/ and register the plugin.
      # BECKETT_ENABLE=0 keeps the server off for this pass (we only want import).
      # Guarded by a timeout so a hung import fails the job instead of the 25-min cap.
      - name: Import project (editor warm-up)
        shell: pwsh
        env:
          BECKETT_ENABLE: '0'
          BECKETT_AUTO_CONFIG: '0'
        run: |
          $ErrorActionPreference = 'Stop'
          $p = Start-Process -FilePath "$env:GODOT_BIN" `
            -ArgumentList @('--headless', '--editor', '--path', '.', '--quit') `
            -PassThru
          # Wait-Process throws on timeout; SilentlyContinue makes it non-fatal, then we
          # inspect HasExited (Wait-Process has no -PassThru). The probe step is the real
          # gate, so a slow/hung import warns rather than fails.
          Wait-Process -Id $p.Id -Timeout 300 -ErrorAction SilentlyContinue
          if ($p.HasExited) {
            Write-Host "import pass exited with code $($p.ExitCode)"
          } else {
            Write-Warning 'import pass exceeded 300s; killing and continuing'
            try { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } catch {}
          }

      # Parse-check every addon script (catches parse errors + the class-name-cache
      # trap). --check-only exits non-zero and/or prints SCRIPT ERROR / Parse Error.
      - name: Parse-check addon scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scripts = Get-ChildItem -Path 'addons/beckett' -Recurse -Filter '*.gd'
          Write-Host "parse-checking $($scripts.Count) scripts under addons/beckett"
          $bad = 0
          foreach ($s in $scripts) {
            $out = & "$env:GODOT_BIN" --headless --path . --check-only --script $s.FullName 2>&1 | Out-String
            $ok = ($LASTEXITCODE -eq 0) -and ($out -notmatch 'SCRIPT ERROR|Parse Error')
            if ($ok) {
              Write-Host "  ok   $($s.Name)"
            } else {
              $bad++
              Write-Host "  FAIL $($s.Name)" -ForegroundColor Red
              Write-Host $out
            }
          }
          if ($bad -gt 0) { throw "$bad script(s) failed the parse check" }
          Write-Host "all $($scripts.Count) scripts parsed clean"

      # Boot headless + probe the live MCP endpoint (initialize + tools/list).
      # ci-smoke.ps1 owns the boot, the wait, the assertions, and ALWAYS kills the
      # editor in its finally block. One code path for CI and local runs.
      - name: Boot + probe MCP endpoint
        shell: pwsh
        run: |
          & "$env:GODOT_BIN" --headless --version | Out-Null
          ./tests/ci-smoke.ps1 -GodotExe "$env:GODOT_BIN" -Port ([int]$env:BECKETT_CI_PORT) -ProjectPath . -ExpectedTools 50

      # Belt-and-suspenders: guarantee no Godot process outlives the job even if a
      # step above died before ci-smoke.ps1's finally ran.
      - name: Kill stray Godot processes
        if: always()
        shell: pwsh
        run: |
          Get-Process -ErrorAction SilentlyContinue |
            Where-Object { $_.ProcessName -like 'Godot*' } |
            ForEach-Object {
              try { Stop-Process -Id $_.Id -Force -ErrorAction Stop; Write-Host "killed $($_.Id) ($($_.ProcessName))" } catch {}
            }
